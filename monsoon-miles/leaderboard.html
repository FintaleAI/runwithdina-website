<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — RWD Monsoon Miles 2026</title>
<meta name="description" content="Live category leaderboard for RWD Monsoon Miles 2026.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#050505; --ink:#0a0a0a; --charcoal:#111; --slate:#666; --silver:#999; --mist:#bbb;
    --white:#f5f5f0; --pure:#fff; --rain:#3b82f6; --rain-light:#60a5fa; --lightning:#fbbf24; --moss:#22c55e;
    --serif:'Instrument Serif',Georgia,serif; --sans:'Space Grotesk',system-ui,sans-serif; --mono:'JetBrains Mono',monospace;
    --ease:cubic-bezier(0.16,1,0.3,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--black);color:var(--white);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  body{min-height:100dvh;padding:1.5rem 1rem 3rem;position:relative;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(900px 500px at 78% -6%, rgba(59,130,246,.16), transparent 60%),
               radial-gradient(700px 600px at 6% 108%, rgba(96,165,250,.10), transparent 55%);}
  .rain-lines{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
    background-image:repeating-linear-gradient(104deg, transparent 0 24px, rgba(255,255,255,.02) 24px 25px);}
  .wrap{position:relative;z-index:1;width:100%;max-width:560px;margin:0 auto}

  .back{display:inline-block;font-family:var(--mono);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;
    color:var(--silver);text-decoration:none;margin-bottom:1.3rem;transition:color .3s var(--ease)}
  .back:hover{color:var(--rain-light)}

  .eyebrow{display:flex;align-items:center;gap:.5rem;font-family:var(--mono);font-size:.68rem;font-weight:500;
    letter-spacing:.22em;text-transform:uppercase;color:var(--rain-light)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--moss);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.55)}70%{box-shadow:0 0 0 7px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
  h1{font-family:var(--serif);font-style:italic;font-weight:400;font-size:2.7rem;line-height:1;margin:.55rem 0 1.1rem}
  h1 span{color:var(--rain-light)}

  /* filters */
  .cats{display:flex;gap:.45rem}
  .cat{flex:1;font-family:var(--sans);font-weight:600;font-size:.9rem;color:var(--mist);
    background:var(--charcoal);border:1px solid rgba(255,255,255,.1);border-radius:.75rem;
    padding:.72rem .4rem;cursor:pointer;transition:all .2s var(--ease);text-align:center;min-height:44px}
  .cat.active{background:var(--rain);border-color:var(--rain);color:#fff}
  .genders{display:flex;gap:.45rem;margin-top:.5rem}
  .gen{flex:1;font-family:var(--mono);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--silver);
    background:transparent;border:1px solid rgba(255,255,255,.14);border-radius:.75rem;padding:.62rem .4rem;
    cursor:pointer;transition:all .2s var(--ease);min-height:40px}
  .gen.active{border-color:var(--rain-light);color:var(--rain-light);background:rgba(59,130,246,.1)}
  .searchrow{margin-top:.5rem}
  .search{width:100%;background:var(--ink);border:1px solid rgba(255,255,255,.12);border-radius:.75rem;
    color:var(--white);font-family:var(--sans);font-size:16px;padding:.72rem .95rem;outline:none;
    transition:border-color .25s var(--ease)}
  .search::placeholder{color:#555}
  .search:focus{border-color:var(--rain)}

  /* list */
  .board{margin-top:1rem;background:var(--charcoal);border:1px solid rgba(255,255,255,.08);border-radius:1rem;
    overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .row{display:flex;align-items:center;gap:.8rem;padding:.72rem .95rem;border-bottom:1px solid rgba(255,255,255,.06);
    min-height:58px}
  .row:last-child{border-bottom:none}
  .row.me{background:rgba(59,130,246,.12);box-shadow:inset 3px 0 0 var(--rain)}
  .rk{flex:0 0 40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:var(--sans);font-weight:700;font-size:.95rem;color:var(--mist);background:var(--ink);
    border:1px solid rgba(255,255,255,.1);font-variant-numeric:tabular-nums}
  .rk.g1{color:#111;background:var(--lightning);border-color:var(--lightning)}
  .rk.g2{color:#111;background:#c9d2dd;border-color:#c9d2dd}
  .rk.g3{color:#fff;background:#c2703e;border-color:#c2703e}
  .who{flex:1;min-width:0}
  .who .nm{font-family:var(--serif);font-style:italic;font-size:1.12rem;line-height:1.15;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis}
  .who .sub{font-family:var(--mono);font-size:.62rem;letter-spacing:.08em;color:var(--silver);margin-top:.14rem}
  .laps{text-align:right;flex:0 0 auto}
  .laps .n{font-family:var(--sans);font-weight:700;font-size:1.55rem;line-height:1;font-variant-numeric:tabular-nums}
  .laps .l{font-family:var(--mono);font-size:.56rem;letter-spacing:.16em;text-transform:uppercase;color:var(--silver);margin-top:.15rem}
  .row.me .laps .n{color:var(--rain-light)}

  .more{width:100%;background:transparent;border:none;border-top:1px solid rgba(255,255,255,.08);
    color:var(--rain-light);font-family:var(--sans);font-weight:600;font-size:.88rem;padding:.9rem;cursor:pointer;min-height:44px}

  /* empty / pre-race state */
  .empty{margin-top:1rem;background:var(--charcoal);border:1px solid rgba(255,255,255,.08);border-radius:1rem;
    padding:2.2rem 1.4rem;text-align:center}
  .empty .ic{font-size:1.8rem}
  .empty .t{font-family:var(--serif);font-style:italic;font-size:1.4rem;margin-top:.5rem}
  .empty .s{font-size:.88rem;color:var(--mist);margin-top:.5rem;line-height:1.55}
  .empty .cd{font-family:var(--mono);font-size:1.5rem;color:var(--rain-light);margin-top:.9rem;font-variant-numeric:tabular-nums}
  .spinner{width:26px;height:26px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--rain);border-radius:50%;
    animation:spin .8s linear infinite;margin:0 auto}
  @keyframes spin{to{transform:rotate(360deg)}}

  .updated{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:1rem;
    font-family:var(--mono);font-size:.66rem;letter-spacing:.05em;color:var(--slate)}
  .updated .live{color:var(--moss)}
  .links{display:flex;gap:.6rem;margin-top:1rem}
  .lnk{flex:1;display:block;text-align:center;text-decoration:none;background:transparent;
    border:1px solid rgba(255,255,255,.16);color:var(--mist);border-radius:.7rem;
    font-family:var(--sans);font-weight:500;font-size:.85rem;padding:.75rem;transition:all .2s var(--ease);min-height:44px}
  .lnk:hover{border-color:var(--rain);color:var(--white)}
  .foot{text-align:center;margin-top:1.6rem;font-family:var(--mono);font-size:.64rem;letter-spacing:.1em;color:#4a4a4a}
  .foot b{color:var(--rain-light)}
  @media(max-width:380px){ h1{font-size:2.3rem} .who .nm{font-size:1rem} }
</style>
</head>
<body>
<div class="rain-lines"></div>

<div class="wrap">
  <a href="progress.html" class="back">&larr; Track my run</a>

  <div class="eyebrow"><span class="dot"></span> Live &middot; Monsoon Miles 2026</div>
  <h1>Leader<span>board</span></h1>

  <div class="cats" id="cats">
    <button class="cat" data-cat="1 Hour">1 Hour</button>
    <button class="cat" data-cat="2 Hours">2 Hours</button>
    <button class="cat active" data-cat="4 Hours">4 Hours</button>
  </div>
  <div class="genders" id="gens">
    <button class="gen active" data-gen="Women">Women</button>
    <button class="gen" data-gen="Men">Men</button>
    <button class="gen" data-gen="All">All</button>
  </div>
  <div class="searchrow"><input class="search" id="q" type="search" placeholder="Search name or BIB&hellip;" autocomplete="off"></div>

  <div class="empty" id="loading"><div class="spinner"></div><div class="s" style="margin-top:.8rem">Loading standings&hellip;</div></div>

  <div class="empty" id="prerace" style="display:none">
    <div class="ic">&#127937;</div>
    <div class="t">Opens at flag-off</div>
    <div class="s" id="preSub">The live leaderboard starts with the race.</div>
    <div class="cd" id="preCd">&mdash;</div>
  </div>

  <div class="board" id="board" style="display:none"></div>
  <button class="more" id="moreBtn" style="display:none">Show everyone</button>

  <div class="updated" id="updBar" style="display:none"><span class="live">&#9679; LIVE</span><span id="upd">updated &mdash;</span> &middot; auto-refreshing</div>

  <div class="links">
    <a class="lnk" href="progress.html">My live stats</a>
    <a class="lnk" href="results.html">Official results</a>
  </div>

  <div class="foot">RWD Monsoon Miles 2026 &middot; <b>#MonsoonMiles2026</b></div>
</div>

<script>
(function(){
  "use strict";
  var qp = new URLSearchParams(location.search);
  var LIVE_URL   = 'https://api.raceresult.com/409224/HL8NF6L146EES0UN4PEK3H2UL9CHPFZG';
  var ROSTER_URL = 'https://api.raceresult.com/409224/20PV4DYOB89ZROYZRPJ2IP8VEGEX71ME';
  var POLL_MS = 20000;
  var RACE_DAY = new Date('2026-07-26T04:00:00+05:30');
  function raceLive(){ return qp.get('raceday')==='1' || Date.now() >= RACE_DAY.getTime(); }
  var FLAG = { '1 Hour':'2026-07-26T07:45:00+05:30', '2 Hours':'2026-07-26T05:35:00+05:30', '4 Hours':'2026-07-26T05:30:00+05:30' };

  var $=function(id){return document.getElementById(id);};
  var selCat = qp.get('cat') || '4 Hours';
  var selGen = qp.get('gender') || 'Women';
  var myBib  = (qp.get('bib')||'').replace(/[^0-9]/g,'') || (function(){ try{return localStorage.getItem('mm_bib')||'';}catch(e){return '';} })();
  var expanded=false, timer=null, cdTimer=null, roster=null, live=null;

  if(!FLAG[selCat]) selCat='4 Hours';
  if(['Women','Men','All'].indexOf(selGen)<0) selGen='Women';

  function catForBib(bib){ var c=String(bib).charAt(0); return c==='1'?'1 Hour':c==='2'?'2 Hours':c==='4'?'4 Hours':''; }
  function cleanName(s){ return String(s||'').replace(/^[\s,]+/,'').replace(/\s+/g,' ').trim(); }
  function titleCase(s){ return s.toLowerCase().replace(/(^|\s|-)\S/g, function(c){ return c.toUpperCase(); }); }
  function nowStr(){ var d=new Date(); function p(n){return (n<10?'0':'')+n;} return p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds()); }

  function syncButtons(){
    var i, cs=document.querySelectorAll('.cat');
    for(i=0;i<cs.length;i++) cs[i].classList.toggle('active', cs[i].getAttribute('data-cat')===selCat);
    var gs=document.querySelectorAll('.gen');
    for(i=0;i<gs.length;i++) gs[i].classList.toggle('active', gs[i].getAttribute('data-gen')===selGen);
  }

  function fetchRoster(){
    if(roster) return Promise.resolve(roster);
    return fetch(ROSTER_URL).then(function(r){return r.json();}).then(function(rows){
      var m={};
      rows.forEach(function(r){ m[String(r.Bib)]={ name:titleCase(cleanName(r.Name)), gender: r.Gender==='F'?'Women':(r.Gender==='M'?'Men':'') }; });
      roster=m; return m;
    });
  }
  function fetchLive(){ return fetch(LIVE_URL).then(function(r){return r.json();}); }

  function build(){
    if(!roster||!live) return [];
    var out=[];
    live.forEach(function(r){
      var bib=String(r.Bib), base=roster[bib]||{};
      if(catForBib(bib)!==selCat) return;
      if(selGen!=='All' && base.gender!==selGen) return;
      out.push({
        bib:bib, name:base.name||('BIB '+bib), gender:base.gender||'',
        laps:(r.TotalLaps!==''&&r.TotalLaps!=null)?+r.TotalLaps:0,
        rank:parseInt(String(r.Rank||'').replace(/[^0-9]/g,''),10)||9999,
        grank:parseInt(String(r.GenderRank||'').replace(/[^0-9]/g,''),10)||9999
      });
    });
    out.sort(function(a,b){ return selGen==='All' ? a.rank-b.rank : a.grank-b.grank; });
    return out;
  }

  function render(){
    var q=($('q').value||'').trim().toLowerCase();
    var rows=build();
    if(q){ rows=rows.filter(function(r){ return r.name.toLowerCase().indexOf(q)>=0 || r.bib.indexOf(q)>=0; }); }
    var LIMIT=25, shown = (expanded||q) ? rows : rows.slice(0,LIMIT);
    var h='';
    shown.forEach(function(r,i){
      var pos = selGen==='All' ? r.rank : r.grank;
      if(pos===9999) pos=i+1;
      var cls = pos===1?'rk g1':pos===2?'rk g2':pos===3?'rk g3':'rk';
      var me = myBib && r.bib===myBib ? ' me':'';
      h+='<div class="row'+me+'"><div class="'+cls+'">'+pos+'</div>'
        +'<div class="who"><div class="nm">'+r.name+'</div>'
        +'<div class="sub">BIB '+r.bib+(selGen==='All'&&r.gender?' &middot; '+r.gender:'')+'</div></div>'
        +'<div class="laps"><div class="n">'+r.laps+'</div><div class="l">Laps</div></div></div>';
    });
    if(!shown.length){ h='<div class="row"><div class="who"><div class="sub" style="padding:.6rem 0">No runners match.</div></div></div>'; }
    $('board').innerHTML=h;
    $('board').style.display='block';
    $('loading').style.display='none';
    $('moreBtn').style.display = (!expanded && !q && rows.length>LIMIT) ? 'block':'none';
    if(rows.length>LIMIT) $('moreBtn').textContent='Show everyone ('+rows.length+')';
    $('updBar').style.display='flex';
    $('upd').textContent='updated '+nowStr();
  }

  function refresh(silent){
    if(!silent){ $('loading').style.display='block'; $('board').style.display='none'; $('prerace').style.display='none'; }
    Promise.all([fetchRoster(), fetchLive()]).then(function(res){
      live=res[1]; render();
    }).catch(function(){
      $('loading').style.display='none';
      $('prerace').style.display='block';
      $('preSub').textContent='Could not reach the timing feed. Check your connection.';
      $('preCd').textContent='';
    });
  }

  function fmt(ms){ ms=Math.max(0,Math.floor(ms/1000));
    var h=Math.floor(ms/3600),m=Math.floor(ms%3600/60),s=ms%60;
    function p(n){return (n<10?'0':'')+n;}
    return h+':'+p(m)+':'+p(s); }
  function showPrerace(){
    $('loading').style.display='none'; $('board').style.display='none'; $('moreBtn').style.display='none'; $('updBar').style.display='none';
    $('prerace').style.display='block';
    $('preSub').textContent='The '+selCat+' leaderboard goes live at flag-off on Sunday, 26 July.';
    if(cdTimer) clearInterval(cdTimer);
    function tick(){ var off=new Date(FLAG[selCat]).getTime(), d=off-Date.now();
      $('preCd').textContent = d>0 ? fmt(d) : 'Any moment now'; }
    tick(); cdTimer=setInterval(tick,1000);
  }

  function go(){
    syncButtons();
    if(raceLive()){ if(cdTimer){clearInterval(cdTimer);cdTimer=null;} refresh(false); startPoll(); }
    else { stopPoll(); showPrerace(); }
  }
  function startPoll(){ stopPoll(); timer=setInterval(function(){ refresh(true); }, POLL_MS); }
  function stopPoll(){ if(timer){clearInterval(timer); timer=null;} }

  var i, cs=document.querySelectorAll('.cat');
  for(i=0;i<cs.length;i++){ cs[i].addEventListener('click', function(){ selCat=this.getAttribute('data-cat'); expanded=false; go(); }); }
  var gs=document.querySelectorAll('.gen');
  for(i=0;i<gs.length;i++){ gs[i].addEventListener('click', function(){ selGen=this.getAttribute('data-gen'); expanded=false; go(); }); }
  $('q').addEventListener('input', function(){ if(raceLive()&&live) render(); });
  $('moreBtn').addEventListener('click', function(){ expanded=true; render(); });
  document.addEventListener('visibilitychange', function(){
    if(document.hidden){ stopPoll(); }
    else if(raceLive()){ refresh(true); startPoll(); }
  });
  window.addEventListener('beforeunload', stopPoll);

  go();
})();
</script>
</body>
</html>
